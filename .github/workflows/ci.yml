name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Run tests (stdlib zlib backend)
        run: pytest -q

      - name: Install optional accelerators
        # Wheels are not always published for brand-new CPython; don't fail
        # the run if they cannot be installed on the newest interpreter.
        continue-on-error: true
        run: pip install isal zlib-ng uvloop

      - name: Run tests (with accelerators when available)
        continue-on-error: true
        run: pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install flake8 isort
      - name: flake8
        run: flake8 async_unzip tests
      - name: isort
        run: isort --check-only async_unzip tests
