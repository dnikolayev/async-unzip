name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Run tests (stdlib zlib backend)
        run: pytest -q

      - name: Install optional accelerators (best effort)
        # Wheels are not always published for brand-new CPython. Install each
        # accelerator independently so one missing wheel does not block the
        # others; the suite adapts to whichever subset is importable.
        run: |
          for pkg in isal zlib-ng uvloop; do
            pip install "$pkg" || echo "::warning::optional accelerator '$pkg' not installed for ${{ matrix.python-version }}"
          done

      - name: Run tests (with accelerators when available)
        # Gating: whatever accelerators did install must pass. A real
        # isal/zlib-ng/uvloop regression fails CI here instead of hiding.
        # Coverage is gated only on this run (the most backends are
        # importable here, so it is the highest, most stable measurement).
        run: pytest -q --cov=async_unzip --cov-fail-under=93

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install flake8 isort
      - name: flake8
        run: flake8 async_unzip tests
      - name: isort
        run: isort --check-only async_unzip tests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install mypy and the package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install mypy
      - name: mypy
        run: mypy async_unzip
