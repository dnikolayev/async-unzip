name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token stored.
# Triggered when a GitHub Release is published; the release tag's commit is
# what gets built. Configure the matching trusted publisher on PyPI:
#   Project: async-unzip | Workflow: publish.yml | Environment: pypi

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Verify version matches the release tag
        # The tag (e.g. v0.7.0 or 0.7.0) must match async_unzip.__version__,
        # so a mistagged release fails before anything is uploaded.
        run: |
          pkg=$(python -c "import async_unzip; print(async_unzip.__version__)")
          tag="${GITHUB_REF_NAME#v}"
          echo "package=$pkg tag=$tag"
          test "$pkg" = "$tag"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
      contents: read   # for download-artifact within this run
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
