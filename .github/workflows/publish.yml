name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token stored.
# Triggered when a GitHub Release is published; the release tag's commit is
# what gets built. Configure the matching trusted publisher on PyPI:
#   Project: async-unzip | Workflow: publish.yml | Environment: pypi

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify:
    name: Verify checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and check dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: black
        run: black --check async_unzip tests

      - name: isort
        run: isort --check-only async_unzip tests

      - name: flake8
        run: flake8 async_unzip tests

      - name: pylint
        run: pylint async_unzip tests

      - name: mypy
        run: mypy async_unzip

      - name: pytest
        run: pytest -q --cov=async_unzip --cov-fail-under=93

  build:
    name: Build distribution
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Verify version matches the release tag
        # The tag (e.g. v0.7.0 or 0.7.0) must match async_unzip.__version__,
        # so a mistagged release fails before anything is uploaded.
        run: |
          pkg=$(python -c "import async_unzip; print(async_unzip.__version__)")
          tag="${GITHUB_REF_NAME#v}"
          echo "package=$pkg tag=$tag"
          test "$pkg" = "$tag"

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
      contents: read   # for download-artifact within this run
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        # Pinned to a commit SHA (v1.14.0) since this action holds id-token.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
